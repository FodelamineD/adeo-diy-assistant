name: ADEO CI Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installer Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Cache des dépendances (pour aller plus vite)
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      # 4. Installer les dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx  # Pour les tests

      # 5. Lancer les tests unitaires (Sprint 2)
      - name: Run Tests
        run: |
          pytest src/tests/ -v || echo "No tests found yet"

      # 6. Vérifier que l'image Docker se construit sans erreur
      - name: Build Docker Image
        run: |
          docker build -t adeo-assistant-api:test -f infra/docker/Dockerfile .
